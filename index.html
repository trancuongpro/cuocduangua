<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Đặt Cược Đua Ngựa - Tết Việt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" src="nenngua.mp3" loop></audio>
    <audio id="sound-start" src="sungbatdau.mp3"></audio>
    <audio id="sound-race" src="duanguachinh.mp3" loop></audio>

    <div class="game-container" id="main-container">
        
        <div id="bet-screen-content">
            <h1 class="game-title">Đặt Cược Đua Ngựa</h1>

            <div class="betting-grid" id="betting-grid"></div>

            <div class="balance-section">
                <span class="balance-text">Tiền Của Bạn Là: <strong id="user-balance">1000</strong></span>
                <img src="tienvang.png" alt="coin" class="coin-icon">
                <button class="btn btn-start" id="btn-start">Bắt Đầu</button>
            </div>

            <div class="controls-section">
                <button class="btn btn-guide" id="btn-guide">Hướng Dẫn</button>
                <div class="audio-toggle" id="audio-toggle">
                    <svg id="icon-sound-on" viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    <svg id="icon-sound-off" viewBox="0 0 24 24" class="hidden">
                        <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
                    </svg>
                </div>
            </div>

            <div class="guide-modal hidden" id="guide-modal">
                <div class="guide-content">
                    <p id="guide-text" style="white-space: pre-line;"></p> 
                    <button class="btn btn-close" id="btn-close-guide">Đóng</button>
                </div>
            </div>
        </div>

        <div id="race-screen" class="hidden">
            <div class="countdown" id="countdown"></div>
            <div class="track-area" id="track-area"></div>
            <div id="race-result-overlay" class="hidden">
                <div class="result-text" id="result-text"></div>
            </div>
        </div>

        <footer class="game-footer">
            Thiết Kế Trần Cường - Zalo: 0907860662
        </footer>
    </div>

    <script src="huongdan.js"></script>
    <script src="nguadua.js"></script>
    <script src="script.js"></script>
</body>
</html>
